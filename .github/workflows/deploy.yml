name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to the droplet
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # The server key is locked to a forced command that runs the deploy
          # script, so the command below is ignored server-side.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new root@162.243.165.45 deploy
